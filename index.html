<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigma Bot - System Status</title>
    <style>
        /* CSS: Hacker Terminal Theme */
        body {
            background-color: #0d1117;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .terminal-container {
            background: #000;
            border: 2px solid #00ff00;
            border-radius: 10px;
            padding: 20px;
            width: 80%;
            max-width: 600px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
        }
        .header {
            border-bottom: 1px dashed #00ff00;
            padding-bottom: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 0 0 5px #00ff00;
        }
        .content {
            font-size: 1.1rem;
            line-height: 1.5;
        }
        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.1rem;
            background-color: #00ff00;
            animation: blink 1s infinite;
            vertical-align: bottom;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .footer {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #aaaaaa;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="terminal-container">
        <div class="header">🛡️ SIGMA BOT SECURITY SYSTEM 🛡️</div>
        <div class="content" id="terminal-text"></div><span class="cursor"></span>
        <div class="footer">Uptime Monitoring Active • 24/7 Edge Server</div>
    </div>

    <script>
        // JavaScript: Terminal Typing Effect
        const textToType = [
            "Initializing Server Protocol...",
            "Loading Base URL bypass rules...",
            "Decrypting AES payloads...",
            "Connecting to Telegram API...",
            "STATUS: BOT IS ONLINE AND RUNNING 24/7 ✅"
        ];
        
        let lineIndex = 0;
        let charIndex = 0;
        const terminalText = document.getElementById("terminal-text");

        function typeWriter() {
            if (lineIndex < textToType.length) {
                if (charIndex < textToType[lineIndex].length) {
                    terminalText.innerHTML += textToType[lineIndex].charAt(charIndex);
                    charIndex++;
                    setTimeout(typeWriter, 50); // Typing speed
                } else {
                    terminalText.innerHTML += "<br><br>"; // Next line
                    lineIndex++;
                    charIndex = 0;
                    setTimeout(typeWriter, 500); // Pause between lines
                }
            }
        }
        
        // Start effect on load
        window.onload = typeWriter;
    </script>
</body>
  </html>
